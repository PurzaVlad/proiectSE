<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem expert - Alegerea sportului potrivit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-decoration"></div>
  <main class="container">
    <header class="hero">
      <div class="hero-badge">🏃 Sistem Expert</div>
      <h1>Alegerea Sportului Potrivit</h1>
      <p>Completeaza formularul și descoperă sportul perfect pentru tine. Motorul expert iti recomanda cele mai potrivite activități.</p>
    </header>

    <section class="card form-card">
      <h2 class="form-title">📋 Completează Profilul Tău</h2>
      <form id="expertForm">
        <div class="grid">
          <label class="form-group">
            <span class="label-icon">💪</span>
            <span class="label-text">Nivel activitate fizica</span>
            <select name="activityLevel" required>
              <option value="">Selecteaza</option>
              <option value="sedentary">Sedentar</option>
              <option value="moderate">Moderat</option>
              <option value="active">Activ</option>
            </select>
          </label>

          <label class="form-group">
            <span class="label-icon">⚡</span>
            <span class="label-text">Nivel conditie fizica</span>
            <select name="fitnessLevel" required>
              <option value="">Selecteaza</option>
              <option value="beginner">Incepator</option>
              <option value="intermediate">Intermediar</option>
              <option value="advanced">Avansat</option>
            </select>
          </label>

          <label class="form-group">
            <span class="label-icon">🏠</span>
            <span class="label-text">Mediu preferat</span>
            <select name="environment" required>
              <option value="">Selecteaza</option>
              <option value="indoor">Indoor</option>
              <option value="outdoor">Outdoor</option>
            </select>
          </label>

          <label class="form-group">
            <span class="label-icon">⏱️</span>
            <span class="label-text">Timp disponibil pe saptamana</span>
            <select name="time" required>
              <option value="">Selecteaza</option>
              <option value="low">Scazut (1-2 ore)</option>
              <option value="medium">Mediu (3-5 ore)</option>
              <option value="high">Ridicat (6+ ore)</option>
            </select>
          </label>

          <label class="form-group">
            <span class="label-icon">👥</span>
            <span class="label-text">Preferinta de practicare</span>
            <select name="style" required>
              <option value="">Selecteaza</option>
              <option value="individual">Individual</option>
              <option value="team">Echipa</option>
            </select>
          </label>

          <label class="form-group">
            <span class="label-icon">🎯</span>
            <span class="label-text">Obiectiv principal</span>
            <select name="goal" required>
              <option value="">Selecteaza</option>
              <option value="weight_loss">Scadere in greutate</option>
              <option value="endurance">Cresterea rezistentei</option>
              <option value="general_health">Sanatate generala</option>
              <option value="social">Socializare</option>
              <option value="stress_relief">Reducerea stresului</option>
            </select>
          </label>

          <label class="form-group">
            <span class="label-icon">🦴</span>
            <span class="label-text">Probleme articulare</span>
            <select name="jointIssues" required>
              <option value="">Selecteaza</option>
              <option value="yes">Da</option>
              <option value="no">Nu</option>
            </select>
          </label>

          <label class="form-group">
            <span class="label-icon">🧠</span>
            <span class="label-text">Coordonare motrica</span>
            <select name="coordination" required>
              <option value="">Selecteaza</option>
              <option value="low">Scazuta</option>
              <option value="high">Ridicata</option>
            </select>
          </label>

          <label>
            Buget disponibil pentru sport
            <select name="budget" required>
              <option value="">Selecteaza</option>
              <option value="low">Scazut</option>
              <option value="medium">Mediu</option>
              <option value="high">Ridicat</option>
            </select>
          </label>

          <label>
            Intensitate dorita
            <select name="intensityPreference" required>
              <option value="">Selecteaza</option>
              <option value="low">Redusa</option>
              <option value="medium">Moderata</option>
              <option value="high">Ridicata</option>
            </select>
          </label>

          <label>
            Nivel de competitivitate dorit
            <select name="competitiveness" required>
              <option value="">Selecteaza</option>
              <option value="low">Relaxat</option>
              <option value="medium">Echilibrat</option>
              <option value="high">Competitiv</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">✨ Genereaza Recomandare</button>
          <button type="reset" id="resetBtn" class="btn-secondary">↻ Reseteaza</button>
        </div>
      </form>
    </section>

    <section class="card result-card hidden" id="resultCard">
      <div class="result-header">
        <h2>🏆 Recomandare Personalizată</h2>
        <p id="mainRecommendation" class="main-recommendation"></p>
        <p id="sportDescription" class="sport-description"></p>
      </div>

      <div class="result-section">
        <h3>✅ Criterii Aplicate</h3>
        <ul id="appliedBiasList" class="criteria-list"></ul>
      </div>

      <div class="result-section">
        <h3>💡 De Ce?</h3>
        <ul id="reasonList" class="reasons-list"></ul>
      </div>

      <div class="result-section">
        <h3>🥇 Top 5 Sporturi Recomandate</h3>
        <ol id="rankingList" class="ranking-list"></ol>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
